<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{USER_ROLE}} Timetable</title>
</head>
<body>
<h2>Welcome, {{USER_NAME}} ({{USER_ROLE}})</h2>
<p>Please click the cells to mark your available periods and then click Save.</p>

<form method="POST" action="/save-timetable">
    <input type="hidden" id="availabilityData" name="availabilityData" value="{{AVAILABILITY_STRING}}">

    <table border="1">
        <thead>
        <tr>
            <th>Period</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
        </tr>
        </thead>
        <tbody>
        {{TABLE_BODY}}
        </tbody>
    </table>

    <br>
    <button type="submit">Save Timetable</button>

    <a href="{{BACK_URL}}">{{BACK_TEXT}}</a>
</form>

<script>
    /**
     * This function is called when a user clicks a cell.
     * It toggles the visual color of the cell and updates the hidden 45-character string.
     * No AJAX is used here; data is only sent when the form is submitted.
     * @param index The 1D index (0-44) of the period.
     */
    function toggleCell(index) {
        // Get the HTML elements (cell and hidden input for availability data)
        const cell = document.getElementById('cell-' + index);
        const hiddenInput = document.getElementById('availabilityData');

        // Convert the current string (e.g., "00100...") into an array of characters for easy modification
        let availabilityArray = hiddenInput.value.split('');

        // Check the current status and toggle it (1 = available, 0 = busy)
        if (availabilityArray[index] === '1') {
            // It was available, change to busy: reset background color and update array value
            availabilityArray[index] = '0';
            cell.style.backgroundColor = ""; // Reset to default
        } else {
            // It was busy, change to available: set lightgreen background and update array value
            availabilityArray[index] = '1';
            cell.style.backgroundColor = "lightgreen"; // Mark as available
        }

        // Join the array back into a string and update the hidden input (to submit with form)
        hiddenInput.value = availabilityArray.join('');
    }
</script>
</body>
</html>
