<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-success { background-color: #d1e7dd !important; }
    </style>
</head>
<body class="container mt-5">
<h2>Welcome, {{STUDENT_NAME}}</h2>
<p>Click on the time slots to mark your availability (Green = Available). <strong>Do not forget to click Save!</strong></p>

<form method="POST" action="/save-timetable">

    <input type="hidden" id="availabilityData" name="availabilityData" value="{{AVAILABILITY_STRING}}">

    <table class="table table-bordered text-center">
        <thead>
        <tr>
            <th>Period</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
        </tr>
        </thead>
        <tbody>
        {{TABLE_BODY}}
        </tbody>
    </table>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary btn-lg">Save Timetable</button>
        <a href="/" class="btn btn-secondary btn-lg ms-2">Back to Home</a>
    </div>
</form>

<script>
    /**
     * This function is called when a user clicks a cell.
     * It toggles the visual color of the cell and updates the hidden 45-character string.
     * No AJAX is used here; data is only sent when the form is submitted.
     */
    function toggleCell(index) {
        // 1. Get the HTML elements
        const cell = document.getElementById('cell-' + index);
        const hiddenInput = document.getElementById('availabilityData');

        // 2. Convert the current string (e.g., "00100...") into an array of characters for easy modification
        let availabilityArray = hiddenInput.value.split('');

        // 3. Check the current status and toggle it
        if (availabilityArray[index] === '1') {
            // It was available, change to busy
            availabilityArray[index] = '0';
            cell.classList.remove('table-success');
            cell.innerText = 'Busy';
        } else {
            // It was busy, change to available
            availabilityArray[index] = '1';
            cell.classList.add('table-success');
            cell.innerText = 'Available';
        }

        // 4. Join the array back into a string and update the hidden input
        hiddenInput.value = availabilityArray.join('');
    }
</script>
</body>
</html>
